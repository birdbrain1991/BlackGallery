<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK LODGE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── RENDERER ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// ── SCENE ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080000);
scene.fog = new THREE.Fog(0x080000, 14, 28);

// ── CAMERA — eye level, looking in ──
const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.01, 60);
camera.position.set(0, 1.65, 8);
camera.lookAt(-5, 1.3, 0);

// ── CHECKERBOARD FLOOR TEXTURE ──
const tc = document.createElement('canvas');
tc.width = tc.height = 512;
const ctx = tc.getContext('2d');
const tiles = 16;
const px = 512 / tiles;
for (let r = 0; r < tiles; r++) {
  for (let c = 0; c < tiles; c++) {
    ctx.fillStyle = (r + c) % 2 === 0 ? '#E8E8E8' : '#111111';
    ctx.fillRect(c * px, r * px, px, px);
  }
}
const floorTex = new THREE.CanvasTexture(tc);
floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
floorTex.repeat.set(2, 2);

// ── FLOOR ──
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 24),
  new THREE.MeshLambertMaterial({ map: floorTex })
);
floor.rotation.x = -Math.PI / 2;
floor.position.set(0, 0, -4);
floor.receiveShadow = true;
scene.add(floor);

// ── WALLS ──
const wallMat = new THREE.MeshLambertMaterial({ color: 0x0c0000 });

// back wall
const bw = new THREE.Mesh(new THREE.PlaneGeometry(20, 7), wallMat);
bw.position.set(0, 3.5, -12);
scene.add(bw);

// left wall
const lw = new THREE.Mesh(new THREE.PlaneGeometry(24, 7), wallMat);
lw.rotation.y = Math.PI / 2;
lw.position.set(-10, 3.5, -2);
scene.add(lw);

// right wall
const rw = new THREE.Mesh(new THREE.PlaneGeometry(24, 7), wallMat);
rw.rotation.y = -Math.PI / 2;
rw.position.set(10, 3.5, -2);
scene.add(rw);

// ceiling
const cw = new THREE.Mesh(new THREE.PlaneGeometry(20, 24), wallMat);
cw.rotation.x = Math.PI / 2;
cw.position.set(0, 7, -4);
scene.add(cw);

// ── LIGHTING ──
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const spot = new THREE.SpotLight(0xffffff, 2.5, 22, Math.PI * 0.28, 0.5, 1.2);
spot.position.set(0, 6, 2);
spot.target.position.set(0, 0, -3);
spot.castShadow = true;
scene.add(spot);
scene.add(spot.target);

const spot2 = new THREE.SpotLight(0xffffff, 1.5, 18, Math.PI * 0.25, 0.6, 1.5);
spot2.position.set(0, 6, -5);
spot2.target.position.set(0, 0, -10);
scene.add(spot2);
scene.add(spot2.target);


function makeCurtainStrip(axis, length, folds, startX, startZ) {
  const curtainH = 7;
  const segsAlong = folds * 6;
  const segsY = 6;
  const positions = [], uvs = [], indices = [];

  for (let ia = 0; ia <= segsAlong; ia++) {
    const t = ia / segsAlong;
    const wave = 0; // flat geometry, folds via texture only
    for (let iy = 0; iy <= segsY; iy++) {
      const y = (iy / segsY) * curtainH;
      let px, pz;
      if (axis === 'Z') { px = wave;         pz = -t * length; }
      else              { px = -t * length;  pz = wave; }
      positions.push(px, y, pz);
      uvs.push(t * folds, iy / segsY);
    }
  }
  for (let ia = 0; ia < segsAlong; ia++) {
    for (let iy = 0; iy < segsY; iy++) {
      const a = ia*(segsY+1)+iy, b=a+1, c=a+(segsY+1), d=c+1;
      indices.push(a,b,c, b,d,c);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  const ctc = document.createElement('canvas');
  ctc.width = 512; ctc.height = 64;
  const cctx = ctc.getContext('2d');
  for (let i = 0; i < folds; i++) {
    const fw = ctc.width / folds;
    const light = i % 2 === 0;
    const grd = cctx.createLinearGradient(i*fw, 0, (i+1)*fw, 0);
    grd.addColorStop(0,   light ? '#6a0808':'#2a0303');
    grd.addColorStop(0.4, light ? '#cc1111':'#6a0606');
    grd.addColorStop(0.7, light ? '#dd1818':'#7a0808');
    grd.addColorStop(1.0, light ? '#5a0606':'#1a0202');
    cctx.fillStyle = grd;
    cctx.fillRect(i*fw, 0, fw, ctc.height);
  }
  const tex = new THREE.CanvasTexture(ctc);
  tex.wrapS = THREE.RepeatWrapping;

  const mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(startX, 0, startZ);
  mesh.castShadow = true;
  scene.add(mesh);
}

// Left wall: curtain runs along Z (into room), sits at x=-9.85
makeCurtainStrip('Z', 24, 10, -9.85, 10);

// Back wall: simple plane rotated to face camera
(function() {
  const ctc = document.createElement('canvas');
  ctc.width = 512; ctc.height = 256;
  const cctx = ctc.getContext('2d');
  const folds = 60;
  for (let i = 0; i < folds; i++) {
    const fw = ctc.width / folds;
    const light = i % 2 === 0;
    const grd = cctx.createLinearGradient(i*fw, 0, (i+1)*fw, 0);
    grd.addColorStop(0,   light ? '#6a0808':'#2a0303');
    grd.addColorStop(0.4, light ? '#cc1111':'#6a0606');
    grd.addColorStop(0.7, light ? '#dd1818':'#7a0808');
    grd.addColorStop(1.0, light ? '#5a0606':'#1a0202');
    cctx.fillStyle = grd;
    cctx.fillRect(i*fw, 0, fw, ctc.height);
  }
  const tex = new THREE.CanvasTexture(ctc);
  const mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(22, 7), mat);
  mesh.position.set(-1, 3.5, -12);
  scene.add(mesh);
})();



// ── TABLE (close to camera) ──
const tableMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
const tableBase = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.65, 0.07, 32), tableMat);
tableBase.position.set(-2.5, 0.03, 6.5);
scene.add(tableBase);
const tableStem = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.10, 0.88, 16), tableMat);
tableStem.position.set(-2.5, 0.48, 6.5);
scene.add(tableStem);
const tableTop = new THREE.Mesh(new THREE.CylinderGeometry(0.72, 0.72, 0.06, 48), tableMat);
tableTop.position.set(-2.5, 0.94, 6.5);
scene.add(tableTop);

// ── TV (floating above table, built from geometry) ──
const tvGroup = new THREE.Group();

// materials
const tvBodyMat  = new THREE.MeshLambertMaterial({ color: 0xC8BA8A }); // beige/cream
const tvDarkMat  = new THREE.MeshLambertMaterial({ color: 0x2A2A2A }); // dark panel
const tvScreenMat= new THREE.MeshBasicMaterial({ color: 0x1a1a1a });   // screen
const tvKnobMat  = new THREE.MeshLambertMaterial({ color: 0x111111 });
const tvChromeMat= new THREE.MeshLambertMaterial({ color: 0x999999 });

// main body
const tvBody = new THREE.Mesh(new THREE.BoxGeometry(0.88, 0.82, 0.42), tvBodyMat);
tvBody.position.set(-0.07, 0, 0);
tvGroup.add(tvBody);

// screen bezel (inset, slightly smaller, same front face)
const bezel = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.60, 0.06), tvDarkMat);
bezel.position.set(-0.08, 0.02, 0.21);
tvGroup.add(bezel);

// screen (rounded look via slightly smaller box)
const screen = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.50, 0.03), tvScreenMat);
screen.position.set(-0.08, 0.02, 0.245);
tvGroup.add(screen);

// right side dark panel — positioned so it doesn't share any face with tvBody
const sidePanel = new THREE.Mesh(new THREE.BoxGeometry(0.30, 0.82, 0.42), tvDarkMat);
sidePanel.position.set(0.55, 0, 0); // moved far enough right to not overlap
tvGroup.add(sidePanel);

// two large knobs on right panel
[-0.14, 0.12].forEach(y => {
  const knobRing = new THREE.Mesh(new THREE.CylinderGeometry(0.075, 0.075, 0.04, 24), tvChromeMat);
  knobRing.rotation.x = Math.PI / 2;
  knobRing.position.set(0.42, y, 0.18);
  tvGroup.add(knobRing);
  const knobCenter = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 0.06, 24), tvKnobMat);
  knobCenter.rotation.x = Math.PI / 2;
  knobCenter.position.set(0.42, y, 0.21);
  tvGroup.add(knobCenter);
});

// small buttons on far right strip
for (let i = 0; i < 6; i++) {
  const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.025, 12), tvChromeMat);
  btn.rotation.x = Math.PI / 2;
  btn.position.set(0.50, 0.28 - i * 0.1, 0.19);
  tvGroup.add(btn);
}

// antenna
const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.012, 0.55, 8), tvChromeMat);
antenna.position.set(0.15, 0.68, 0.0);
antenna.rotation.z = 0.15;
tvGroup.add(antenna);

// legs / feet
[-0.3, 0.3].forEach(x => {
  const leg = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.14), tvBodyMat);
  leg.position.set(x, -0.45, 0.05);
  tvGroup.add(leg);
});

// speaker grille lines on right panel
for (let i = 0; i < 5; i++) {
  const grille = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.012, 0.01), tvKnobMat);
  grille.position.set(0.40, -0.15 - i * 0.045, 0.215);
  tvGroup.add(grille);
}

tvGroup.position.set(-2.5, 1.70, 6.5);
scene.add(tvGroup);

// ── RENDER LOOP — bob + rotate TV ──
let clock = 0;
function animate() {
  requestAnimationFrame(animate);
  clock += 0.016;
  tvGroup.position.y = 1.70 + Math.sin(clock * 1.0) * 0.07;
  tvGroup.rotation.y = Math.sin(clock * 0.35) * 0.28;
  renderer.render(scene, camera);
}
animate();

// ── RESIZE ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

  <div id="lightbox-close">[ close ]</div>
  <img id="lightbox-img" src="" alt="">

<script>
// ── GALLERY LOGIC ──
const images = [
  'https://res.cloudinary.com/diybhptdl/image/upload/v1775557475/Picsart_26-04-04_08-10-04-017_ilbk41.png',
  'https://res.cloudinary.com/diybhptdl/image/upload/v1775557475/Picsart_26-04-07_10-50-51-607_jxpezi.png',
  'https://res.cloudinary.com/diybhptdl/image/upload/v1775557475/Picsart_26-04-04_08-11-15-220_ci00en.png',
];

let current = 0;
const cvs = document.getElementById('gallery-canvas');
const c2d = cvs.getContext('2d');
const placeholder = document.getElementById('gallery-placeholder');
const counter = document.getElementById('gallery-counter');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

function drawWithFade(imgEl) {
  const W = imgEl.naturalWidth;
  const H = imgEl.naturalHeight;
  cvs.width = W;
  cvs.height = H;
  c2d.clearRect(0, 0, W, H);
  c2d.drawImage(imgEl, 0, 0);

  // fade: only darken pixels that have alpha > 0
  const imageData = c2d.getImageData(0, 0, W, H);
  const data = imageData.data;
  const fadeStart = H * 0.65; // fade begins at 65% down
  for (let y = 0; y < H; y++) {
    if (y < fadeStart) continue;
    const strength = Math.pow((y - fadeStart) / (H - fadeStart), 1.4) * 0.88;
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      if (data[i + 3] < 10) continue; // skip transparent pixels
      data[i]     = Math.round(data[i]     * (1 - strength));
      data[i + 1] = Math.round(data[i + 1] * (1 - strength));
      data[i + 2] = Math.round(data[i + 2] * (1 - strength));
    }
  }
  c2d.putImageData(imageData, 0, 0);
  cvs.style.display = 'block';
  placeholder.style.display = 'none';
}

function updateGallery() {
  counter.textContent = `${current + 1} / ${images.length}`;
  cvs.style.display = 'none';
  const imgEl = new Image();
  imgEl.crossOrigin = 'anonymous';
  imgEl.onload = () => drawWithFade(imgEl);
  imgEl.src = images[current];
}

document.getElementById('prev-btn').addEventListener('click', () => {
  current = (current - 1 + images.length) % images.length;
  updateGallery();
});
document.getElementById('next-btn').addEventListener('click', () => {
  current = (current + 1) % images.length;
  updateGallery();
});

// lightbox
cvs.addEventListener('click', () => {
  lightboxImg.src = images[current];
  lightbox.classList.add('active');
});
lightbox.addEventListener('click', () => lightbox.classList.remove('active'));
document.getElementById('lightbox-close').addEventListener('click', e => {
  e.stopPropagation();
  lightbox.classList.remove('active');
});

updateGallery();
</script>
</body>
